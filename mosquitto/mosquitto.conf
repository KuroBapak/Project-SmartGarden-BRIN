# ── Listeners ──
# TCP — server-side (MqttService, MqttListener)
listener 1883 0.0.0.0
protocol mqtt

# WebSocket — browser (settings page, dashboard pump in WS mode)
listener 8083 0.0.0.0
protocol websockets

# ── Security ──
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# ── Persistence ──
persistence true
persistence_location /mosquitto/data/

# ── Logging ──
log_dest stdout
log_type warning
log_type error
log_type notice
# log_type all  # uncomment for debugging
