# =============================================================
# SmartGarden BRIN — Docker Compose (Pak Yogi Deployment)
# Port range: 7000-7010
# =============================================================

services:
  # ─── MySQL Database ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: smartgarden-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - smartgarden
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-smartgarden_root_2026}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${DB_PORT_HOST:-7002}:3306"
    # MySQL exposed to host on 7002 for debugging/backup purposes

    # ─── Laravel Dashboard (Nginx Unit + PHP 8.3) ──────────────
  app:
    # MENGGUNAKAN PRE-BUILT IMAGE DARI GITHUB TEAM SAYA
    image: ghcr.io/kurobapak/project-smartgarden-brin:latest
    pull_policy: always
    container_name: smartgarden-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-7000}:8000"
    # Menggunakan shared env file untuk semua credentials
    env_file:
      - .env
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - smartgarden
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── AI Server (FastAPI + YOLO) ─────────────────────────────
  ai-server:
    # MENGGUNAKAN PRE-BUILT IMAGE DARI GITHUB TEAM SAYA
    image: ghcr.io/kurobapak/project-smartgarden-brin-ai:latest
    pull_policy: always
    container_name: smartgarden-ai
    restart: unless-stopped
    ports:
      - "${AI_PORT:-7001}:8001"
    # Menggunakan shared env file yang sama
    env_file:
      - .env
    depends_on:
      - app
    networks:
      - smartgarden
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── EMQX (MQTT Broker + Rule Engine) ───────────────────────
  emqx:
    image: emqx:5.6
    container_name: smartgarden-emqx
    restart: unless-stopped
    ports:
      - "1883:1883" # MQTT TCP (untuk ESP32)
      - "8083:8083" # MQTT WebSocket (untuk Dashboard)
      - "18083:18083" # EMQX Admin Dashboard
    volumes:
      - emqx_data:/opt/emqx/data
    networks:
      - smartgarden
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── InfluxDB (Time-Series Database) ────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: smartgarden-influx
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    networks:
      - smartgarden
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
    driver: local
  storage_data:
    driver: local
  emqx_data:
    driver: local
  influxdb_data:
    driver: local
  influxdb_config:
    driver: local

networks:
  smartgarden:
    driver: bridge
